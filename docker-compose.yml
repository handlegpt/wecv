services:
  db:
    image: postgres:15-alpine
    container_name: wecv_ai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wecv_ai
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wecv_ai_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wecv_ai_backend
    restart: always
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/wecv_ai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_wecv_ai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key}
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - PRISMA_ENGINE_CHECKSUM_IGNORE=1
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./temp:/app/temp

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wecv_ai_frontend
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_APP_NAME=WeCV AI
      - NEXT_PUBLIC_APP_VERSION=1.0.0
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-your-google-client-id}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
  redis_data: 