version: '3.9'
services:
  db:
    image: postgres:15-alpine
    container_name: wecv_ai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wecv_ai
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wecv_ai_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wecv_ai_backend
    restart: always
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/wecv_ai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_wecv_ai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key}
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./temp:/app/temp
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wecv_ai_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_NAME=WeCV AI
      - NEXT_PUBLIC_APP_VERSION=1.0.0
    ports:
      - '3000:3000'
    depends_on:
      - backend

  # Alternative simple frontend build (if main build fails)
  frontend-simple:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.simple
    container_name: wecv_ai_frontend_simple
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_NAME=WeCV AI
      - NEXT_PUBLIC_APP_VERSION=1.0.0
    ports:
      - '3000:3000'
    depends_on:
      - backend
    profiles:
      - simple

  # Optional: Monitoring for development
  prometheus:
    image: prom/prometheus:latest
    container_name: wecv_ai_prometheus_dev
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_dev_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    profiles:
      - monitoring

volumes:
  db_data:
  redis_data:
  prometheus_dev_data: 